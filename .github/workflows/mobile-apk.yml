name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL to bake into the app"
        required: false
        default: "https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1"
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-apk.yml"

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      API_URL: ${{ github.event.inputs.api_base_url || 'https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_URL
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clams-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
