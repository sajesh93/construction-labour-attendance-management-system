name: Build Android APK

# Manual-only: the Deploy workflow already builds the APK on every push to
# main, so a push trigger here would build it twice.
on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL to bake into the app"
        required: false
        default: "https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1"

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      API_URL: ${{ github.event.inputs.api_base_url || 'https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Configure release signing (if secrets present)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — building debug-signed."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/clams-release.jks
          cat > android/key.properties <<EOF
          storeFile=clams-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          echo "Release signing configured."
      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_URL
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clams-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
