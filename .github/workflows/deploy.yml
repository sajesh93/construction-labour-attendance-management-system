name: Deploy

# Builds the images in ACR and rolls the Azure Container Apps.
# Needs the AZURE_CREDENTIALS repo secret (service principal with
# Contributor on the clams-rg resource group).
#
# Only the parts that actually changed are rebuilt: the `changes` job diffs the
# push and every other job gates on it. A backend-only commit never pays for the
# (slow) Flutter APK build; an admin-only commit reuses the APK already being
# served at /download instead of rebuilding an identical one.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "admin/**"
      - "mobile/**"
      - ".github/workflows/deploy.yml"

env:
  ACR: clamsacr8ca7
  RESOURCE_GROUP: clams-rg
  API_BASE_URL: https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1
  ADMIN_BASE_URL: https://clams-admin.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # A manual workflow_dispatch has no diff to inspect and reports no
          # changes; each job below treats that case as "rebuild everything".
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'admin/**'
              - '.github/workflows/deploy.yml'
            mobile:
              - 'mobile/**'
              - '.github/workflows/deploy.yml'

  apk:
    name: Build Android APK
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — building debug-signed."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/clams-release.jks
          cat > android/key.properties <<EOF
          storeFile=clams-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          echo "Release signing configured."
      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_BASE_URL
      - uses: actions/upload-artifact@v4
        with:
          name: clams-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  deploy-api:
    name: Deploy API
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: |
          TAG=${GITHUB_SHA::7}
          cd backend && az acr build --registry $ACR --image clams-api:$TAG --file Dockerfile .
      - name: Roll container app
        run: |
          TAG=${GITHUB_SHA::7}
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp update -g $RESOURCE_GROUP -n clams-api \
            --image $ACR.azurecr.io/clams-api:$TAG
      - name: Verify health
        run: |
          sleep 20
          curl -fsS "$API_BASE_URL/health"

  deploy-admin:
    name: Deploy Admin
    needs: [changes, apk]
    # `apk` is skipped on an admin-only commit, and a skipped need would skip
    # this job too — so gate on the outcome explicitly rather than on success().
    if: |
      always()
      && needs.apk.result != 'failure'
      && needs.apk.result != 'cancelled'
      && (needs.changes.outputs.admin == 'true'
          || needs.changes.outputs.mobile == 'true'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The admin image serves the APK at /download, so the image always needs
      # one baked in. Fresh build when mobile changed; otherwise re-use the APK
      # the live admin is already serving so we don't rebuild an identical one.
      - name: Fetch freshly built APK
        if: needs.apk.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: clams-apk
          path: apk
      - name: Re-use the currently deployed APK
        if: needs.apk.result == 'skipped'
        run: |
          mkdir -p apk
          curl -fsSL "$ADMIN_BASE_URL/download" -o apk/app-release.apk
          test -s apk/app-release.apk
      - run: cp apk/app-release.apk admin/public/CLAMS.apk

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: |
          TAG=${GITHUB_SHA::7}
          cd admin && az acr build --registry $ACR --image clams-admin:$TAG --file Dockerfile .
      - name: Roll container app
        run: |
          TAG=${GITHUB_SHA::7}
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp update -g $RESOURCE_GROUP -n clams-admin \
            --image $ACR.azurecr.io/clams-admin:$TAG
      - name: Verify /download
        run: |
          sleep 20
          curl -fsSI "$ADMIN_BASE_URL/download" | tee headers.txt
          grep -qi "content-disposition: attachment" headers.txt
