name: Deploy

# Builds the images in ACR and rolls the Azure Container Apps.
# Needs the AZURE_CREDENTIALS repo secret (service principal with
# Contributor on the clams-rg resource group).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "admin/**"
      - "mobile/**"
      - ".github/workflows/deploy.yml"

env:
  ACR: clamsacr8ca7
  RESOURCE_GROUP: clams-rg
  API_BASE_URL: https://clams-api.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io/api/v1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — building debug-signed."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/clams-release.jks
          cat > android/key.properties <<EOF
          storeFile=clams-release.jks
          storePassword=$STORE_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          echo "Release signing configured."
      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=$API_BASE_URL
      - uses: actions/upload-artifact@v4
        with:
          name: clams-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: |
          TAG=${GITHUB_SHA::7}
          cd backend && az acr build --registry $ACR --image clams-api:$TAG --file Dockerfile .
      - name: Roll container app
        run: |
          TAG=${GITHUB_SHA::7}
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp update -g $RESOURCE_GROUP -n clams-api \
            --image $ACR.azurecr.io/clams-api:$TAG
      - name: Verify health
        run: |
          sleep 20
          curl -fsS "$API_BASE_URL/health"

  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: apk
    steps:
      - uses: actions/checkout@v4
      - name: Bundle APK for the /download endpoint
        uses: actions/download-artifact@v4
        with:
          name: clams-apk
          path: apk
      - run: cp apk/app-release.apk admin/public/CLAMS.apk
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: |
          TAG=${GITHUB_SHA::7}
          cd admin && az acr build --registry $ACR --image clams-admin:$TAG --file Dockerfile .
      - name: Roll container app
        run: |
          TAG=${GITHUB_SHA::7}
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp update -g $RESOURCE_GROUP -n clams-admin \
            --image $ACR.azurecr.io/clams-admin:$TAG
      - name: Verify /download
        run: |
          sleep 20
          ADMIN_URL=https://clams-admin.lemoncoast-b230ecb6.centralindia.azurecontainerapps.io
          curl -fsSI "$ADMIN_URL/download" | tee headers.txt
          grep -qi "content-disposition: attachment" headers.txt
