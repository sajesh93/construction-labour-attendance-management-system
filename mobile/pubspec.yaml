name: clams_mobile
description: Construction Labour Attendance Management System — mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Offline storage (SQLite) + secure storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2

  # Device capabilities
  android_id: ^0.4.0 # stable ANDROID_ID so a reinstall keeps device authorization
  nfc_manager: ^3.5.0
  mobile_scanner: ^5.2.3
  geolocator: ^12.0.0
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.1.2

  # Photos (worker registration)
  image_picker: ^1.1.2

  # Badge printing (QR badge PDFs)
  printing: ^5.13.2
  pdf: ^3.11.1

  # Aadhaar Secure QR decoding (gzip inflate + native zxing-cpp live scanner)
  archive: ^3.6.1
  flutter_zxing: ^2.3.0
  camera: ">=0.10.5 <0.13.0"

  # SOS alarm sound (system ringtone/alarm, loops until acknowledged)
  flutter_ringtone_player: ^4.0.0

  # Push notifications (SOS rings even when the app is closed)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Utils
  uuid: ^4.5.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
