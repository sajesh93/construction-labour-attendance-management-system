name: clams_mobile
description: Construction Labour Attendance Management System — mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Offline storage (SQLite) + secure storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2

  # Device capabilities
  nfc_manager: ^3.5.0
  mobile_scanner: ^5.2.3
  geolocator: ^12.0.0
  connectivity_plus: ^6.0.5

  # Photos (worker registration)
  image_picker: ^1.1.2

  # Badge printing (QR badge PDFs)
  printing: ^5.13.2
  pdf: ^3.11.1

  # Aadhaar Secure QR decoding (gzip inflate)
  archive: ^3.6.1

  # Utils
  uuid: ^4.5.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
